<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Сканер</title>

  <!-- Patch getUserMedia BEFORE A-Frame/MindAR load → request HD camera -->
  <script>
    (function () {
      const _orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
      navigator.mediaDevices.getUserMedia = function (c) {
        if (c && c.video) {
          c.video = {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 1920 },
            height: { ideal: 1080 },
          };
        }
        return _orig(c);
      };
    })();
  </script>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root { --emerald: #059669; --cyan: #0891b2; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }

    /* ── Header ── */
    .glass-header {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* ── HUD ── */
    #hud {
      position: fixed; inset: 0; z-index: 100; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      padding-bottom: 40px;
    }

    /* Scanning frame */
    #frame {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      width: clamp(200px, 70vw, 300px);
      height: clamp(200px, 70vw, 300px);
      transition: opacity 0.5s;
    }
    #frame.found { opacity: 0; }

    .c { position: absolute; width: 30px; height: 30px; border-color: rgba(34,211,238,.8); border-style: solid; box-shadow: 0 0 10px rgba(34,211,238,.4), inset 0 0 10px rgba(34,211,238,.4); }
    .c.tl { top:0;left:0; border-width:3px 0 0 3px; border-radius:8px 0 0 0; }
    .c.tr { top:0;right:0; border-width:3px 3px 0 0; border-radius:0 8px 0 0; }
    .c.bl { bottom:0;left:0; border-width:0 0 3px 3px; border-radius:0 0 0 8px; }
    .c.br { bottom:0;right:0; border-width:0 3px 3px 0; border-radius:0 0 8px 0; }
    .sl {
      position: absolute; left:4px; right:4px; height:2px;
      background: linear-gradient(90deg, transparent, rgba(34,211,238,.9), transparent);
      animation: scan 2s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(34,211,238,1);
    }
    @keyframes scan { 0%{top:4px;opacity:1} 90%{top:calc(100% - 6px);opacity:.3} 100%{top:4px;opacity:1} }

    /* Glass elements */
    .glass-ui {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    #pill {
      border-radius: 9999px;
      padding: 10px 24px;
      font-size: 0.875rem;
      display: flex; align-items: center; gap: 10px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #pill.found { border-color: rgba(52,211,153,.5); box-shadow: 0 0 20px rgba(52,211,153,.2); background: rgba(5,150,105,0.2); }
    .dot { width:8px; height:8px; border-radius:50%; background:#22d3ee; animation:blink 1.4s ease-in-out infinite; box-shadow: 0 0 8px #22d3ee; }
    #pill.found .dot { background:#34d399; animation:none; box-shadow: 0 0 8px #34d399; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    #ptxt { color:#e2e8f0; font-weight: 500; transition:color .3s; }
    #pill.found #ptxt { color:#6ee7b7; }

    /* Sound button */
    #sound-btn {
      position: fixed; top: 88px; left: 16px; z-index: 110;
      width: 48px; height: 48px;
      border-radius: 50%;
      color: #34d399; font-size: 1.25rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .3s;
    }
    #sound-btn:hover { border-color: rgba(34,211,238,.4); color: #fff; transform: scale(1.05); }
    #sound-btn.muted { border-color: rgba(255,255,255,.15); color: #94a3b8; }

    /* Splash screen */
    #splash {
      position: fixed; inset: 0; z-index: 300;
      background: linear-gradient(135deg, #020617, #064e3b, #083344);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity .5s ease, backdrop-filter .5s ease;
    }
    #splash::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(34, 211, 238, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(34, 211, 238, 0.1) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.5; z-index: -1;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    
    .btn-glow {
      position: relative;
      background: linear-gradient(135deg, var(--emerald), var(--cyan));
      border-radius: 9999px;
      color: white;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      z-index: 1;
      border: none;
    }
    .btn-glow::before {
      content: ''; position: absolute; inset: -2px;
      background: linear-gradient(135deg, #34d399, #22d3ee, #34d399);
      border-radius: 9999px; z-index: -1; filter: blur(12px); opacity: 0.6;
      animation: glowPulse 3s linear infinite; background-size: 200% 200%;
    }
    .btn-glow:hover { transform: scale(1.05); }
    @keyframes glowPulse { 0% { background-position: 0% 50%; opacity: 0.5; } 50% { background-position: 100% 50%; opacity: 0.8; } 100% { background-position: 0% 50%; opacity: 0.5; } }

    /* Error screen */
    #err {
      display: none; position: fixed; inset: 0; z-index: 400;
      background: #0f172a; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 32px; text-align: center;
    }
    #err.show { display: flex; }
  </style>
</head>
<body class="antialiased">

<!-- ════ HEADER ════ -->
<header class="fixed w-full top-0 z-[200] glass-header px-4 sm:px-6 lg:px-8">
  <div class="flex items-center justify-between h-16 max-w-7xl mx-auto">
    <a href="./index.html" class="flex items-center gap-3 group">
      <div class="relative w-8 h-8 flex items-center justify-center bg-gradient-to-br from-emerald-500 to-cyan-500 rounded-lg shadow-lg shadow-cyan-500/20 group-hover:shadow-cyan-500/40 transition">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
      </div>
      <span class="font-bold text-lg tracking-wider text-white">ХАМИР.VR</span>
    </a>
    <div class="flex items-center gap-3 md:gap-4">
      <select class="lang-select bg-slate-900/50 border border-slate-700 text-white text-xs rounded-lg focus:ring-cyan-500 focus:border-cyan-500 block p-1.5 outline-none cursor-pointer">
        <option value="ru">RU</option>
        <option value="kk">KK</option>
        <option value="en">EN</option>
      </select>
      <a href="./index.html" class="text-xs font-semibold text-slate-300 hover:text-cyan-400 uppercase tracking-widest transition flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        <span data-i18n="nav_back">Назад</span>
      </a>
    </div>
  </div>
</header>

<!-- ══ AR ══ -->
<a-scene
  id="scene"
  mindar-image="imageTargetSrc: ./markers/target.mind;
    filterMinCF: 0.001;
    filterBeta:  0.1;
    missTolerance: 10;
    uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights; antialias: false; precision: medium"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video id="vid"
      src="./videos/video.mp4"
      muted
      playsinline
      loop
      preload="auto"
    ></video>
    <img id="img" src="./markers/target.png" />
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="tgt" mindar-image-target="targetIndex: 0">
    <a-plane
      src="#img"
      position="0 0 0"
      width="1"
      height="0.552"
      rotation="0 0 0">
    </a-plane>
    <a-video
      src="#vid"
      position="0 0 0.001"
      width="1.1"
      height="0.607"
      rotation="0 0 0">
    </a-video>
  </a-entity>

</a-scene>

<!-- ══ SPLASH ══ -->
<div id="splash" class="px-6 text-center">
  <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-emerald-500 to-cyan-500 flex items-center justify-center text-white mb-6 shadow-lg shadow-cyan-500/30 animate-bounce">
    <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
    </svg>
  </div>
  <h2 class="text-2xl font-bold text-white mb-3 tracking-tight" data-i18n="splash_title">AR Сканер</h2>
  <p class="text-slate-400 text-sm mb-6 max-w-xs leading-relaxed" data-i18n="splash_desc">Нажмите кнопку, чтобы открыть камеру и оживить иллюстрации со звуком</p>
  
  <div class="bg-cyan-900/30 border border-cyan-500/30 rounded-xl p-4 mb-8 max-w-xs mx-auto">
    <p class="text-sm font-medium text-cyan-100">
      <span class="text-cyan-400 text-base">⚠️</span> <span data-i18n="splash_warn_title">Важно:</span><br>
      <span data-i18n="splash_warn_text">Сканируйте <strong class="text-white">весь плакат</strong> целиком, а не QR-код!</span>
    </p>
  </div>

  <button id="start-btn" class="btn-glow px-8 py-3.5 text-sm" data-i18n="splash_btn">🎥 Начать AR-сеанс</button>
</div>

<!-- ══ HUD ══ -->
<button id="sound-btn" class="glass-ui" title="Звук">🔊</button>

<div id="hud">
  <div id="frame">
    <div class="c tl"></div><div class="c tr"></div>
    <div class="c bl"></div><div class="c br"></div>
    <div class="sl"></div>
  </div>
  <div id="pill" class="glass-ui">
    <div class="dot"></div>
    <span id="ptxt" data-i18n="hud_scan">Наведите камеру на плакат</span>
  </div>
</div>

<!-- ══ Ошибка ══ -->
<div id="err">
  <div class="w-16 h-16 rounded-2xl bg-red-500/20 text-red-400 flex items-center justify-center mb-2 border border-red-500/30">
    <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
  </div>
  <h2 class="text-xl font-bold text-white" data-i18n="err_title">Файлы не найдены</h2>
  <p id="err-msg" class="text-xs text-red-300 bg-red-900/30 px-3 py-1 rounded-full border border-red-500/20"></p>
  <div class="text-slate-400 text-sm leading-relaxed max-w-sm mt-2" data-i18n="err_desc">
    Положите <strong class="text-white">target.mind</strong> и <strong class="text-white">target.png</strong> в <code class="bg-slate-800 px-1 rounded">ar-site/markers/</code><br>
    и <strong class="text-white">video.mp4</strong> в <code class="bg-slate-800 px-1 rounded">ar-site/videos/</code>
  </div>
</div>

<script>
  const vid   = document.getElementById('vid');
  const tgt   = document.getElementById('tgt');
  const pill  = document.getElementById('pill');
  const frame = document.getElementById('frame');
  const ptxt  = document.getElementById('ptxt');
  const err   = document.getElementById('err');
  const errMsg= document.getElementById('err-msg');

  async function fileExists(url) {
    try {
      const r = await fetch(url, { method: 'HEAD' });
      return r.ok;
    } catch { return false; }
  }

  (async () => {
    const [mindOk, videoOk, imgOk] = await Promise.all([
      fileExists('./markers/target.mind'),
      fileExists('./videos/video.mp4'),
      fileExists('./markers/target.png'),
    ]);

    const missing = [];
    if (!mindOk)  missing.push('markers/target.mind');
    if (!videoOk) missing.push('videos/video.mp4');
    if (!imgOk)   missing.push('markers/target.png');

    if (missing.length) {
      errMsg.textContent = 'Не найдено: ' + missing.join(', ');
      err.classList.add('show');
    }
  })();

  const splash   = document.getElementById('splash');
  const startBtn = document.getElementById('start-btn');

  startBtn.addEventListener('click', () => {
    vid.muted = false;
    vid.play().catch(() => {
      vid.muted = false;
    });
    vid.pause();

    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 500);
  });

  const soundBtn = document.getElementById('sound-btn');
  soundBtn.addEventListener('click', () => {
    vid.muted = !vid.muted;
    soundBtn.textContent = vid.muted ? '🔇' : '🔊';
    soundBtn.classList.toggle('muted', vid.muted);
  });

  tgt.addEventListener('targetFound', () => {
    vid.play().catch(() => {});
    pill.classList.add('found');
    frame.classList.add('found');
    ptxt.setAttribute('data-i18n', 'hud_found');
    ptxt.textContent = typeof t === 'function' ? t('hud_found') : 'Найдено';
  });

  tgt.addEventListener('targetLost', () => {
    vid.pause();
    pill.classList.remove('found');
    frame.classList.remove('found');
    ptxt.setAttribute('data-i18n', 'hud_scan');
    ptxt.textContent = typeof t === 'function' ? t('hud_scan') : 'Наведите камеру на плакат';
  });

  window.addEventListener('orientationchange', () => {
    setTimeout(() => {
      const scene = document.getElementById('scene');
      if (scene && scene.resize) scene.resize();
      window.dispatchEvent(new Event('resize'));
    }, 300);
  });
</script>

<script src="./i18n.js"></script>
</body>
</html>
